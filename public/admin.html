<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإدارة - تعليم الأشكال</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- شريط التنقل -->
    <nav class="navbar navbar-dark bg-primary sticky-top">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h5">⚙️ إدارة الأشكال</span>
            <button class="btn btn-light btn-sm" onclick="location.href='index.html'">
                ← الرئيسية
            </button>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row g-4">
            <!-- نموذج الإضافة -->
            <div class="col-12 col-lg-6">
                <div class="card shadow-lg h-100">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">➕ إضافة شكل جديد</h5>
                    </div>
                    <div class="card-body">
                        <form id="addShapeForm">
                            <!-- حقل اسم الشكل -->
                            <div class="mb-3">
                                <label for="shapeName" class="form-label fw-bold">
                                    📝 اسم الشكل
                                </label>
                                <input 
                                    type="text" 
                                    class="form-control form-control-lg" 
                                    id="shapeName" 
                                    placeholder="مثال: مربع، مثلث، دائرة..."
                                    required
                                >
                                <small class="text-muted d-block mt-2">
                                    اكتب اسم الشكل بوضوح (هذا سيكون الإجابة الصحيحة)
                                </small>
                            </div>

                            <!-- حقل الصورة -->
                            <div class="mb-3">
                                <label for="shapeImage" class="form-label fw-bold">
                                    🖼️ صورة الشكل
                                </label>
                                <input 
                                    type="file" 
                                    class="form-control form-control-lg" 
                                    id="shapeImage" 
                                    accept="image/*"
                                    required
                                >
                                <small class="text-muted d-block mt-2">
                                    الصيغ المدعومة: JPG, PNG, GIF (حجم أقصى: 5MB)
                                </small>
                                <!-- معاينة الصورة -->
                                <div id="imagePreview" class="mt-3 d-none">
                                    <img 
                                        id="previewImg" 
                                        src="" 
                                        alt="معاينة" 
                                        class="img-thumbnail"
                                        style="max-width: 200px;"
                                    >
                                </div>
                            </div>

                            <!-- حقل التلميح -->
                            <div class="mb-3">
                                <label for="shapeHint" class="form-label fw-bold">
                                    💡 تلميح (اختياري)
                                </label>
                                <textarea 
                                    class="form-control form-control-lg" 
                                    id="shapeHint" 
                                    placeholder="مثال: له 4 أضلاع متساوية الطول"
                                    rows="3"
                                ></textarea>
                            </div>

                            <!-- زر الإضافة -->
                            <button 
                                type="submit" 
                                class="btn btn-success btn-lg w-100 fw-bold"
                            >
                                ➕ إضافة الشكل
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- قائمة الأشكال -->
            <div class="col-12 col-lg-6">
                <div class="card shadow-lg h-100">
                    <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">📋 الأشكال المضافة</h5>
                        <span class="badge bg-white text-info" id="shapesCount">0</span>
                    </div>
                    <div class="card-body" style="max-height: 600px; overflow-y: auto;">
                        <div id="shapesList">
                            <p class="text-muted text-center">
                                لا توجد أشكال حتى الآن. أضف شكلك الأول! 🎨
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- رسائل التنبيه (تظهر في الأعلى) -->
    <div id="alertContainer" class="position-fixed top-0 start-50 translate-middle-x mt-3" style="z-index: 9999;"></div>

    <script src="js/admin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
